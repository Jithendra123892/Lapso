# LAPSO Application Configuration
spring.application.name=LAPSO
server.port=${SERVER_PORT:8080}

# PostgreSQL Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:postgres}
# LAPSO Application Configuration
spring.application.name=LAPSO
server.port=${SERVER_PORT:8080}

# PostgreSQL Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.ignore-missing-migrations=true
spring.sql.init.mode=never

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# Redis Cache
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=10000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.concurrency=3
spring.rabbitmq.listener.simple.max-concurrency=10
spring.rabbitmq.listener.simple.prefetch=1
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=1000ms
spring.rabbitmq.listener.simple.retry.max-attempts=3

# Vaadin
vaadin.productionMode=${VAADIN_PRODUCTION_MODE:false}
vaadin.whitelisted-packages=com.example.demo

# Session
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${COOKIE_SECURE:false}
server.servlet.session.cookie.max-age=1800
server.servlet.session.cookie.same-site=lax

# Logging
logging.level.root=WARN
logging.level.org.springframework=INFO
logging.level.org.flywaydb=DEBUG
logging.level.com.example.demo=DEBUG
logging.file.name=logs/lapso.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus,logfile
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.redis.enabled=true
management.health.rabbit.enabled=true
management.health.db.enabled=true
management.metrics.tags.application=${spring.application.name}

# LAPSO Custom Configuration
lapso.base-url=${LAPSO_BASE_URL:http://localhost:8080}
lapso.app.name=LAPSO
lapso.app.version=2.0.0

# 2FA Configuration
lapso.2fa.issuer=LAPSO
lapso.2fa.enabled=true
lapso.2fa.required-for-admin=true
lapso.2fa.backup-codes-count=10

# Audit Log Configuration
lapso.audit.enabled=true
lapso.audit.retention-days=90

# Email Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
lapso.email.from=${EMAIL_FROM:noreply@lapso.in}
lapso.email.from-name=LAPSO Security

# Push Notifications (Firebase)
fcm.enabled=${FCM_ENABLED:false}
fcm.server-key=${FCM_SERVER_KEY:}

# Maps
mappls.api.key=${MAPPLS_API_KEY:}

# SMS (Twilio)
twilio.enabled=${TWILIO_ENABLED:false}
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.phone-number=${TWILIO_PHONE_NUMBER:}

# Rate Limiting
lapso.rate-limit.enabled=true
lapso.rate-limit.requests-per-minute=120
lapso.rate-limit.requests-per-hour=1000

# Security
lapso.security.max-login-attempts=5
lapso.security.lockout-duration-minutes=30
lapso.security.password-reset-expiry-hours=1

# Device Tracking
lapso.tracking.heartbeat-interval-seconds=5
lapso.tracking.location-update-interval-seconds=5
lapso.tracking.offline-threshold-minutes=5

# Geofencing
lapso.geofence.default-radius-meters=100
lapso.geofence.max-geofences-per-user=50

# API Key Configuration
lapso.api-key.max-per-user=10
lapso.api-key.default-expiry-days=365

# File Upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Async Processing
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=lapso-async-
